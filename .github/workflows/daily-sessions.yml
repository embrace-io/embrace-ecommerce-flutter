name: Daily iOS Sessions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      session_count:
        description: 'Number of sessions to produce'
        required: false
        default: '200'
        type: string

jobs:
  produce-sessions:
    name: Produce iOS Sessions
    runs-on: macos-15
    timeout-minutes: 120

    env:
      SESSION_COUNT: ${{ github.event.inputs.session_count || '200' }}
      BUNDLE_ID: io.embrace.embraceEcommerceFlutter

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          cache: true

      - name: Configure Embrace SDK
        run: |
          cat > ios/Runner/EmbraceConfig.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>AppId</key>
              <string>${{ vars.EMBRACE_APP_ID_IOS }}</string>
          </dict>
          </plist>
          EOF
          echo "Configured Embrace with App ID: ${{ vars.EMBRACE_APP_ID_IOS }}"

      - name: Get dependencies
        run: flutter pub get

      - name: Build app
        run: flutter build ios --debug --simulator --no-codesign

      - name: Boot simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16 Pro (" | head -1 | grep -oE '[A-F0-9-]{36}')
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> $GITHUB_OUTPUT
          xcrun simctl boot "$UDID" || true
          sleep 10

      - name: Install app
        run: xcrun simctl install ${{ steps.sim.outputs.udid }} build/ios/iphonesimulator/Runner.app

      - name: Produce sessions
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          COUNT="${SESSION_COUNT}"
          echo "Producing $COUNT sessions on $UDID"
          for i in $(seq 1 "$COUNT"); do
            xcrun simctl launch "$UDID" "$BUNDLE_ID" > /dev/null
            sleep 10
            xcrun simctl terminate "$UDID" "$BUNDLE_ID" > /dev/null 2>&1 || true
            sleep 2
            if [ $((i % 10)) -eq 0 ]; then
              echo "  completed $i / $COUNT sessions"
            fi
          done
          echo "Flushing final session via one extra launch..."
          xcrun simctl launch "$UDID" "$BUNDLE_ID" > /dev/null
          sleep 20
          xcrun simctl terminate "$UDID" "$BUNDLE_ID" > /dev/null 2>&1 || true

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown ${{ steps.sim.outputs.udid }} || true
